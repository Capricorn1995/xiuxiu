<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景渐变：蓝绿系 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="55%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <!-- 背景高光 -->
    <linearGradient id="bgGloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.08"/>
    </linearGradient>
    <!-- 狗脸主色渐变 -->
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF7EC"/>
      <stop offset="100%" stop-color="#F0DCBE"/>
    </linearGradient>
    <!-- 口鼻渐变 -->
    <linearGradient id="snoutGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFBF3"/>
      <stop offset="100%" stop-color="#F5E6CE"/>
    </linearGradient>
    <!-- 耳朵渐变 -->
    <linearGradient id="earGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A86B3E"/>
      <stop offset="100%" stop-color="#7A4A28"/>
    </linearGradient>
    <!-- 鼻子渐变 -->
    <radialGradient id="noseGrad" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#4A5568"/>
      <stop offset="55%" stop-color="#1A202C"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </radialGradient>
    <!-- 鼻子高光 -->
    <radialGradient id="noseGloss" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- 阴影滤镜 -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 资源点发光 -->
    <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bgGloss)"/>

  <!-- 嗅探扫描环（背景装饰） -->
  <g opacity="0.35" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round">
    <circle cx="256" cy="385" r="62" stroke-dasharray="4 10"/>
    <circle cx="256" cy="385" r="84" stroke-dasharray="2 14" opacity="0.6"/>
  </g>

  <!-- 狗头整体（带阴影） -->
  <g filter="url(#softShadow)">
    <!-- 左耳（下垂） -->
    <path d="M 150 175
             Q 110 175 100 230
             Q 92 285 120 320
             Q 150 340 168 305
             Q 180 270 178 220
             Q 176 180 150 175 Z"
          fill="url(#earGrad)"/>
    <!-- 右耳（下垂） -->
    <path d="M 362 175
             Q 402 175 412 230
             Q 420 285 392 320
             Q 362 340 344 305
             Q 332 270 334 220
             Q 336 180 362 175 Z"
          fill="url(#earGrad)"/>

    <!-- 头部主体 -->
    <ellipse cx="256" cy="232" rx="138" ry="128" fill="url(#faceGrad)"/>

    <!-- 头顶棕色斑（比格犬特征） -->
    <path d="M 256 104
             Q 200 108 178 150
             Q 168 175 196 178
             Q 228 172 256 172
             Q 284 172 316 178
             Q 344 175 334 150
             Q 312 108 256 104 Z"
          fill="url(#earGrad)" opacity="0.92"/>

    <!-- 眼睛白眼底 -->
    <ellipse cx="206" cy="222" rx="20" ry="22" fill="#FFFFFF"/>
    <ellipse cx="306" cy="222" rx="20" ry="22" fill="#FFFFFF"/>

    <!-- 瞳孔 -->
    <ellipse cx="210" cy="226" rx="13" ry="15" fill="#1A202C"/>
    <ellipse cx="310" cy="226" rx="13" ry="15" fill="#1A202C"/>

    <!-- 眼睛高光 -->
    <circle cx="215" cy="220" r="4.5" fill="#FFFFFF"/>
    <circle cx="315" cy="220" r="4.5" fill="#FFFFFF"/>
    <circle cx="206" cy="231" r="2" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="306" cy="231" r="2" fill="#FFFFFF" opacity="0.8"/>

    <!-- 口鼻部 -->
    <ellipse cx="256" cy="300" rx="82" ry="62" fill="url(#snoutGrad)"/>

    <!-- 嘴部小弧线 -->
    <path d="M 256 322 Q 244 338 230 332" stroke="#7A4A28" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 256 322 Q 268 338 282 332" stroke="#7A4A28" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- 鼻子（嗅探焦点） -->
    <ellipse cx="256" cy="296" rx="46" ry="34" fill="url(#noseGrad)"/>
    <!-- 鼻孔 -->
    <ellipse cx="240" cy="300" rx="5" ry="7" fill="#000000" opacity="0.55"/>
    <ellipse cx="272" cy="300" rx="5" ry="7" fill="#000000" opacity="0.55"/>
    <!-- 鼻子高光 -->
    <ellipse cx="244" cy="284" rx="16" ry="10" fill="url(#noseGloss)"/>
  </g>

  <!-- 嗅探波纹（鼻子下方） -->
  <g stroke="#FFFFFF" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M 226 348 Q 220 356 226 364"/>
    <path d="M 256 352 Q 256 362 256 372"/>
    <path d="M 286 348 Q 292 356 286 364"/>
  </g>

  <!-- 资源点阵（被嗅探的资源） -->
  <g filter="url(#dotGlow)">
    <circle cx="196" cy="392" r="8" fill="#FBBF24"/>
    <circle cx="232" cy="412" r="6" fill="#F472B6"/>
    <circle cx="280" cy="412" r="7" fill="#FBBF24"/>
    <circle cx="316" cy="392" r="6" fill="#F472B6"/>
    <circle cx="256" cy="430" r="6" fill="#FFFFFF"/>
  </g>
  <g>
    <circle cx="196" cy="392" r="4.5" fill="#FBBF24"/>
    <circle cx="232" cy="412" r="3.5" fill="#F472B6"/>
    <circle cx="280" cy="412" r="4" fill="#FBBF24"/>
    <circle cx="316" cy="392" r="3.5" fill="#F472B6"/>
    <circle cx="256" cy="430" r="3.5" fill="#FFFFFF"/>
  </g>

  <!-- 顶部高光小点 -->
  <ellipse cx="256" cy="118" rx="60" ry="14" fill="#FFFFFF" opacity="0.18"/>
</svg>
