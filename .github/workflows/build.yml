name: Build & Release (Windows)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build renderer & main
        shell: bash
        run: pnpm run build

      - name: Package Windows installer
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 不进行代码签名（投资人内测版）
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          WIN_CSC_LINK: ''
          WIN_CSC_KEY_PASSWORD: ''
        run: pnpm run dist:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiuxiu-windows-installer
          path: release/嗅嗅-Setup-*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiuxiu-windows-portable
          path: release/嗅嗅-*-portable.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: 嗅嗅 ${{ github.ref_name }}
          body: |
            # 嗅嗅 ${{ github.ref_name }}

            ## 下载

            - **Windows 安装包**: `嗅嗅-Setup-${{ github.ref_name }}.exe`
            - **Windows 免安装版**: `嗅嗅-${{ github.ref_name }}-portable.exe`

            ## 安装

            1. 下载 `嗅嗅-Setup-${{ github.ref_name }}.exe`
            2. 双击运行，按提示完成安装
            3. 安装完成后在开始菜单或桌面找到「嗅嗅」启动

            > 注：投资人内测版本，未进行代码签名。首次运行时 Windows SmartScreen 可能会提示「未识别的应用」，请点击「更多信息」→「仍要运行」。
          draft: false
          prerelease: false
          files: |
            release/嗅嗅-Setup-*.exe
            release/嗅嗅-*-portable.exe
            release/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
